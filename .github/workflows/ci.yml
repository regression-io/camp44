name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run linter (non-blocking)
        run: uv run ruff check . || echo "::warning::Linting issues found - see output above"
        continue-on-error: true

      - name: Run formatter check (non-blocking)
        run: uv run ruff format --check . || echo "::warning::Formatting issues found - see output above"
        continue-on-error: true

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  notify:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ needs.build.result }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"; COLOR=3066993; DESC=""
          else
            EMOJI="❌"; COLOR=15158332; DESC="$RUN_URL"
          fi
          curl -sS -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"$EMOJI $REPO\",\"color\":$COLOR,\"description\":\"$DESC\"}]}"
