name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest

    env:
      JWT_SECRET_KEY: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run linter (non-blocking)
        run: uv run ruff check . || echo "::warning::Linting issues found"
        continue-on-error: true

      - name: Run formatter check (non-blocking)
        run: uv run ruff format --check . || echo "::warning::Formatting issues found"
        continue-on-error: true

      - name: Verify imports
        run: uv run python -c "import camp44; print(f'camp44 imported OK')"

  notify:
    needs: smoke
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STATUS: ${{ needs.smoke.result }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"; COLOR=3066993; DESC=""
          else
            EMOJI="❌"; COLOR=15158332; DESC="$RUN_URL"
          fi
          curl -sS -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"$EMOJI $REPO\",\"color\":$COLOR,\"description\":\"$DESC\"}]}"
